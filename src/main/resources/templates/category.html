<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en-US">
<head th:replace="~{fragments/layout :: head(${category.name})}"></head>
<body>
<header th:replace="~{fragments/layout :: header('home')}"></header>

<div class="container max-width-container">
    <div class="row">
        <div class="col-12">
            <div class="page-header">
                <h2 th:text="${category.name} + ' packages'">Category packages</h2>
                <p th:if="${category.description != null}" th:text="${category.description}"></p>
            </div>

            <div th:if="${packages.isEmpty()}" class="alert alert-warning">
                <b>No packages are currently listed for this category.</b>
            </div>

            <th:block th:each="pkg : ${packages}">
                <div th:replace="~{fragments/packages :: packageCard(${pkg}, ${ratings[pkg.name]})}"></div>
            </th:block>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
