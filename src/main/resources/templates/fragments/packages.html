<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en-US">
<body>
<div th:fragment="rating(packageName, rating)">
    <div class="package-rating"
         th:attr="data-package-name=${packageName},data-average=${rating}">
        <button type="button"
                class="btn btn-link rating-star"
                th:each="star : ${#numbers.sequence(1, 5)}"
                th:attr="data-value=${star},title=${'Rate ' + packageName + ' ' + star + ' out of 5'}">
            <span class="rating-star-icon"
                  th:text="${star <= rating} ? '★' : '☆'">☆</span>
        </button>
        <span class="badge rating-percent"
              th:classappend="${@pageViewService.ratingClass(rating)}"
              th:text="${@pageViewService.ratingPercent(rating)} + '%'">0%</span>
        <span class="rating-message d-none"></span>
    </div>
</div>

<div class="package-card" th:fragment="packageCard(pkg, rating)">
    <div class="d-flex justify-content-between align-items-start mb-2">
        <h3 class="mb-0" th:text="${pkg.name}">Package Name</h3>
    </div>

    <p th:if="${pkg.description != null}" th:utext="${pkg.description}"></p>
    <p th:if="${pkg.url != null and !#strings.isEmpty(pkg.url)}">
        <a th:href="${pkg.url}" th:text="${pkg.url}" target="_blank" rel="noopener">Package URL</a>
    </p>

    <!-- Package Versions and Arch Table -->
    <div class="table-responsive mt-3" th:if="${pkg.instances != null and !pkg.instances.isEmpty()}">
        <table class="table table-sm table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>Version</th>
                    <th>OS</th>
                    <th>Architecture</th>
                    <th>Licenses</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="inst : ${@pageViewService.sortedInstances(pkg.instances)}">
                    <td><strong th:text="${inst.version}">1.0</strong></td>
                    <td th:text="${inst.operatingSystem.version}">3.0</td>
                    <td>
                        <span class="badge rounded-pill"
                              th:classappend="${inst.architecture.name == 'amd64'} ? 'badge-arch-amd64' : (${inst.architecture.name == 'i386'} ? 'badge-arch-i386' : 'badge-arch-other')"
                              th:text="${inst.architecture.name}">amd64</span>
                    </td>
                    <td>
                        <span th:each="license, licenseStat : ${@pageViewService.sortedLicenses(inst.licenses)}">
                            <span class="badge bg-secondary me-1" th:text="${license.name}">BSD</span>
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-4">
        <p class="mb-1 text-muted fw-bold">Install via mport:</p>
        <div class="install-command-container">
            <code id="install-cmd-${pkg.name}" th:text="${'mport install ' + pkg.name}">mport install package</code>
            <button class="btn btn-sm copy-btn" type="button" th:onclick="navigator.clipboard.writeText('mport install [[${pkg.name}]]'); $(this).text('Copied!'); setTimeout(() => $(this).text('Copy'), 2000);">
                Copy
            </button>
        </div>
    </div>

    <div class="mt-3">
        <div th:replace="~{fragments/packages :: rating(${pkg.name}, ${rating})}"></div>
    </div>
</div>

<div class="package-card" th:fragment="searchCard(pkg, rating)">
    <div class="d-flex justify-content-between align-items-start mb-2">
        <h3 class="mb-0" th:text="${pkg.name}">Package Name</h3>
    </div>

    <p th:if="${pkg.description != null}" th:utext="${pkg.description}"></p>
    <p th:if="${pkg.url != null and !#strings.isEmpty(pkg.url)}">
        <a th:href="${pkg.url}" th:text="${pkg.url}" target="_blank" rel="noopener">Package URL</a>
    </p>

    <div class="row mb-3">
        <div class="col-md-6" th:if="${pkg.categories != null and !pkg.categories.isEmpty()}">
            <small class="text-muted text-uppercase fw-bold d-block mb-1">Categories</small>
            <span th:each="category, categoryStat : ${pkg.categories}">
                <span class="badge bg-light text-dark border me-1" th:text="${category.name}">Category</span>
            </span>
        </div>

        <div class="col-md-6" th:if="${pkg.licenses != null and !pkg.licenses.isEmpty()}">
            <small class="text-muted text-uppercase fw-bold d-block mb-1">Licenses</small>
            <span th:each="license, licenseStat : ${pkg.licenses}">
                <span class="badge bg-secondary me-1" th:text="${license}">BSD</span>
            </span>
        </div>
    </div>

    <!-- Package Versions and Arch Table -->
    <div class="table-responsive mt-3" th:if="${pkg.instances != null and !pkg.instances.isEmpty()}">
        <table class="table table-sm table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>Version</th>
                    <th>OS</th>
                    <th>Architecture</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="inst : ${@pageViewService.sortedSearchInstances(pkg.instances)}">
                    <td><strong th:text="${inst.version}">1.0</strong></td>
                    <td th:text="${inst.osVersion}">3.0</td>
                    <td>
                        <span class="badge rounded-pill"
                              th:classappend="${inst.architecture == 'amd64'} ? 'badge-arch-amd64' : (${inst.architecture == 'i386'} ? 'badge-arch-i386' : 'badge-arch-other')"
                              th:text="${inst.architecture}">amd64</span>
                    </td>
                    <td>
                        <small th:if="${inst.flavor != null and !#strings.isEmpty(inst.flavor)}" class="text-muted me-2" th:text="${'flavor: ' + inst.flavor}"></small>
                        <small th:if="${inst.cpe != null and !#strings.isEmpty(inst.cpe)}" class="text-muted" th:text="${'cpe: ' + inst.cpe}"></small>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-4">
        <p class="mb-1 text-muted fw-bold">Install via mport:</p>
        <div class="install-command-container">
            <code id="install-cmd-search-${pkg.name}" th:text="${'mport install ' + pkg.name}">mport install package</code>
            <button class="btn btn-sm copy-btn" type="button" th:onclick="navigator.clipboard.writeText('mport install [[${pkg.name}]]'); $(this).text('Copied!'); setTimeout(() => $(this).text('Copy'), 2000);">
                Copy
            </button>
        </div>
    </div>

    <div class="mt-3">
        <div th:replace="~{fragments/packages :: rating(${pkg.name}, ${rating})}"></div>
    </div>
</div>
</body>
</html>
