<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en-US">
<head th:fragment="head(title)">
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title th:text="${title} + ' | MidnightBSD App Store'">MidnightBSD App Store</title>
    <meta name="description" content="Find applications for the MidnightBSD operating system." />
    <meta property="og:site_name" content="MidnightBSD App Store" />
    <meta name="viewport" content="width=device-width" />
    <meta http-equiv="content-language" content="en-us" />
    <link rel="stylesheet" th:href="@{/styles/17.css}" />
    <link rel="stylesheet" th:href="@{/styles/app-store.css}" />
</head>
<body>
<header th:fragment="header(activePage)">
    <div class="container">
        <div id="header" class="row">
            <div class="col-xs-12">
                <h1><a th:href="@{/}"><img src="https://www.midnightbsd.org/art/logo/MidnightBSDLogoText.png" alt="MidnightBSD" /></a></h1>
            </div>
        </div>

        <nav class="navbar navbar-inverse">
            <div class="container-fluid">
                <div class="navbar-header">
                    <a class="navbar-brand" th:href="@{/}">App Store</a>
                </div>
                <ul class="nav navbar-nav">
                    <li th:classappend="${activePage == 'home'} ? 'active'">
                        <a th:href="@{/}">Home</a>
                    </li>
                    <li th:classappend="${activePage == 'search'} ? 'active'">
                        <a th:href="@{/search}">Search</a>
                    </li>
                    <li th:classappend="${activePage == 'privacy'} ? 'active'">
                        <a th:href="@{/privacy}">Privacy</a>
                    </li>
                </ul>
            </div>
        </nav>
    </div>
</header>

<div th:fragment="footer">
    <div class="container">
        <footer>
            <div id="footer" class="row">
                <div class="col-xs-12">
                    <p id="copyright">&#169; 2017-2025 Lucas Holt. All rights reserved.</p>
                    <p>
                        <a th:href="@{/privacy}" title="Privacy Policy">Privacy</a> |
                        <a th:href="@{/search}" title="Search">Search</a>
                    </p>
                </div>
            </div>
        </footer>
    </div>
</div>

<div th:fragment="scripts">
    <script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
    <script th:src="@{/js/bootstrap.min.js}"></script>
    <script th:src="@{/scripts/jquery-ratings.js}"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-F8W6E2ZCV2"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-F8W6E2ZCV2');
    </script>
</div>
</body>
</html>
